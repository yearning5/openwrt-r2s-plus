name: Build OpenWrt R2S Plus + OAF

on:
  workflow_dispatch:           # manual trigger — button in Actions tab
    inputs:
      openwrt_version:
        description: 'OpenWrt tag (e.g. v24.10.3)'
        default: 'v24.10.3'
        required: true

env:
  OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version }}
  TARGET: rockchip/armv8
  OAF_REPO: https://github.com/destan19/OpenAppFilter

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:

    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get autoremove -y
        df -h

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential gawk gcc-multilib gettext \
          libncurses5-dev libssl-dev python3-distutils \
          rsync unzip zlib1g-dev git wget

    - name: Clone OpenWrt ${{ env.OPENWRT_VERSION }}
      run: |
        git clone https://git.openwrt.org/openwrt/openwrt.git \
          --branch $OPENWRT_VERSION --depth 1 openwrt
    - name: Apply R2S Plus eMMC DTS patch
      run: |
        mkdir -p openwrt/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip/
        cp patches/rk3328-nanopi-r2s-plus.dts \
          openwrt/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip/
        cd openwrt
        sed -i '/^TARGET_DEVICES += friendlyarm_nanopi-r2s$/a define Device\/friendlyarm_nanopi-r2s-plus\n  $(call Device\/friendlyarm_nanopi-r2s)\n  DEVICE_MODEL := NanoPi R2S Plus\n  DEVICE_VARIANT := eMMC\n  DEVICE_DTS := rockchip\/rk3328-nanopi-r2s-plus\n  UBOOT_DEVICE_NAME := nanopi-r2s-plus-rk3328\n  SUPPORTED_DEVICES += friendlyarm,nanopi-r2s-plus\nendef\nTARGET_DEVICES += friendlyarm_nanopi-r2s-plus' \
          target/linux/rockchip/image/armv8.mk

    - name: Add OAF feed
      run: |
        cd openwrt
        git clone $OAF_REPO package/oaf-app-filter

    - name: Update & install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply build config
      run: |
        cd openwrt
        cp $GITHUB_WORKSPACE/configs/r2s-plus.config .config
        make defconfig

    - name: Download sources
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -delete   # remove failed small downloads
    - name: Build firmware
      run: |
        cd openwrt
        make -j$(nproc) V=s 2>&1 | tee build.log | \
          grep -E "^(make|ERROR|WARNING)" || true
        # Retry single-threaded on failure for clearer errors
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          make -j1 V=s
        fi

    - name: Collect artifacts
      run: |
        mkdir -p output
        cp openwrt/bin/targets/rockchip/armv8/*r2s-plus* output/ 2>/dev/null || true
        cp openwrt/bin/packages/aarch64_cortex-a53/oaf/*.ipk output/ 2>/dev/null || true
        cp openwrt/build.log output/

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-r2s-plus-${{ env.OPENWRT_VERSION }}
        path: output/
        retention-days: 30
