name: Build OpenWrt R2S Plus + OAF

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt tag (e.g. v24.10.3)'
        default: 'v24.10.3'
        required: true

env:
  OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version }}
  OAF_REPO: https://github.com/destan19/OpenAppFilter

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:

    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get autoremove -y
        df -h

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential gawk gcc-multilib gettext \
          libncurses5-dev libssl-dev python3-distutils \
          rsync unzip zlib1g-dev git wget

    - name: Clone OpenWrt ${{ env.OPENWRT_VERSION }}
      run: |
        git clone https://git.openwrt.org/openwrt/openwrt.git \
          --branch $OPENWRT_VERSION --depth 1 openwrt

    - name: Add OAF feed
      run: |
        cd openwrt
        git clone $OAF_REPO --depth 1 package/oaf-app-filter

    - name: Apply R2S Plus eMMC DTS and board definition
      run: |
        mkdir -p openwrt/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip/
        cp patches/rk3328-nanopi-r2s-plus.dts \
          openwrt/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip/
        cd openwrt
        # Insert R2S Plus board — reuses nanopi-r2s-rk3328 u-boot (same RK3328 chip)
        sed -i '/^TARGET_DEVICES += friendlyarm_nanopi-r2s$/a \
        \
        define Device\/friendlyarm_nanopi-r2s-plus\
          $(call Device\/friendlyarm_nanopi-r2s)\
          DEVICE_MODEL := NanoPi R2S Plus\
          DEVICE_VARIANT := eMMC\
          DEVICE_DTS := rockchip\/rk3328-nanopi-r2s-plus\
          UBOOT_DEVICE_NAME := nanopi-r2s-rk3328\
          SUPPORTED_DEVICES += friendlyarm,nanopi-r2s-plus\
        endef\
        TARGET_DEVICES += friendlyarm_nanopi-r2s-plus' \
                  target/linux/rockchip/image/armv8.mk

    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply build config
      run: |
        cd openwrt
        cp $GITHUB_WORKSPACE/configs/r2s-plus.config .config
        make defconfig

    - name: Download sources
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -delete

    # Build tools and toolchain first, then u-boot explicitly
    # This guarantees nanopi-r2s-rk3328-u-boot-rockchip.bin exists in staging_dir
    # before the parallel main build tries to assemble the R2S Plus image
    - name: Build tools
      run: |
        cd openwrt
        make tools/compile -j$(nproc) V=s

    - name: Build toolchain
      run: |
        cd openwrt
        make toolchain/compile -j$(nproc) V=s

    - name: Build u-boot (must be before main build)
      run: |
        cd openwrt
        make package/boot/uboot-rockchip/compile -j$(nproc) V=s

    - name: Build firmware and all packages
      run: |
        cd openwrt
        make -j$(nproc) V=s 2>&1 | tee build.log | \
          grep -E "^(make\[|ERROR|WARNING)" || true
        if grep -q "^make.*Error" build.log; then
          echo "Retrying single-threaded for clearer errors..."
          make -j1 V=s
        fi

    - name: Collect artifacts
      run: |
        mkdir -p output
        cp openwrt/bin/targets/rockchip/armv8/*r2s-plus* output/ 2>/dev/null || true
        find openwrt/bin/packages -name "*oaf*" -o -name "*appfilter*" | \
          xargs -I{} cp {} output/ 2>/dev/null || true
        cp openwrt/build.log output/

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-r2s-plus-${{ env.OPENWRT_VERSION }}
        path: output/
        retention-days: 30
